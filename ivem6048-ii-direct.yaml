    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Inverter Frequency"
    register_type: holding
    address: 4366
    value_type: U_WORD
    device_class: frequency
    state_class: measurement
    unit_of_measurement: Hz
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: ivem
    id: ivem_inverter_power
    name: "${friendly_name} Inverter Power"
    register_type: holding
    address: 4367
    value_type: S_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Inverter Apparent Power"
    register_type: holding
    address: 4368
    value_type: U_WORD
    state_class: measurement
    unit_of_measurement: VA
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} AC Output Voltage"
    register_type: holding
    address: 4369
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: template
    name: "${friendly_name} Battery Power Charge"
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0
    lambda: |-
      if (isnan(id(ivem_battery_power).state)) {
        return NAN;
      }
      return id(ivem_battery_power).state > 0.0f ? id(ivem_battery_power).state : 0.0f;

  - platform: template
    name: "${friendly_name} Battery Power Discharge"
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0
    lambda: |-
      if (isnan(id(ivem_battery_power).state)) {
        return NAN;
      }
      return id(ivem_battery_power).state < 0.0f ? -id(ivem_battery_power).state : 0.0f;

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} AC Input Voltage"
    register_type: holding
    address: 4375
    register_count: 3
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} AC Input Frequency"
    register_type: holding
    address: 4377
    value_type: U_WORD
    device_class: frequency
    state_class: measurement
    unit_of_measurement: Hz
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} AC Input Current"
    register_type: holding
    address: 4502
    register_count: 4
    value_type: U_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} AC Output Current"
    register_type: holding
    address: 4503
    value_type: U_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Battery Current Signed"
    register_type: holding
    address: 4504
    value_type: S_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} PV Current"
    register_type: holding
    address: 4505
    value_type: U_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} AC Output Apparent Power"
    register_type: holding
    address: 4383
    value_type: U_WORD
    state_class: measurement
    unit_of_measurement: VA
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Load Power"
    register_type: holding
    address: 4382
    register_count: 7
    value_type: S_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Load Percentage"
    register_type: holding
    address: 4384
    value_type: U_WORD
    state_class: measurement
    unit_of_measurement: "%"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Transformer Temperature"
    register_type: holding
    address: 4385
    value_type: S_WORD
    device_class: temperature
    state_class: measurement
    unit_of_measurement: "°C"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Inverter Temperature"
    register_type: holding
    address: 4386
    value_type: S_WORD
    device_class: temperature
    state_class: measurement
    unit_of_measurement: "°C"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Battery Temperature"
    register_type: holding
    address: 4387
    value_type: S_WORD
    device_class: temperature
    state_class: measurement
    unit_of_measurement: "°C"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Bus Voltage"
    register_type: holding
    address: 4388
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} SCC Temperature"
    register_type: holding
    address: 4395
    register_count: 14
    value_type: S_WORD
    device_class: temperature
    state_class: measurement
    unit_of_measurement: "°C"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} SCC Charge Mode"
    register_type: holding
    address: 4396
    value_type: U_WORD
    accuracy_decimals: 0

  # BMS.
  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Flags"
    register_type: holding
    address: 4400
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Connect Count"
    register_type: holding
    address: 4401
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS SoC"
    register_type: holding
    address: 4402
    value_type: U_WORD
    device_class: battery
    state_class: measurement
    unit_of_measurement: "%"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS CV Voltage"
    register_type: holding
    address: 4403
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Float Voltage"
    register_type: holding
    address: 4404
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Cutoff Voltage"
    register_type: holding
    address: 4405
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Max Charge Current"
    register_type: holding
    address: 4406
    value_type: U_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Max Discharge Current"
    register_type: holding
    address: 4407
    value_type: U_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Fault Code"
    register_type: holding
    address: 4408
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  # Generator and smart load.
  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Generator Voltage"
    register_type: holding
    address: 4453
    register_count: 9
    value_type: S_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Generator Current"
    register_type: holding
    address: 4454
    value_type: S_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Generator Frequency"
    register_type: holding
    address: 4455
    value_type: S_WORD
    device_class: frequency
    state_class: measurement
    unit_of_measurement: Hz
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Generator Power"
    register_type: holding
    address: 4456
    value_type: U_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Smart Load Voltage"
    register_type: holding
    address: 4457
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Smart Load Current"
    register_type: holding
    address: 4458
    value_type: S_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Smart Load Frequency"
    register_type: holding
    address: 4459
    value_type: U_WORD
    device_class: frequency
    state_class: measurement
    unit_of_measurement: Hz
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Smart Load Power"
    register_type: holding
    address: 4460
    value_type: U_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    id: ivem_smart_port_status_raw
    name: "${friendly_name} Smart Port Status Raw"
    register_type: holding
    address: 4461
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} EQ Stage"
    register_type: holding
    address: 4500
    value_type: U_WORD
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} AC Input Power"
    register_type: holding
    address: 4509
    register_count: 4
    value_type: U_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} AC Output Power"
    register_type: holding
    address: 4510
    value_type: U_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Battery Power Summary"
    register_type: holding
    address: 4511
    value_type: S_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} PV Power Summary"
    register_type: holding
    address: 4512
    value_type: U_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Communication Connected"
    register_type: holding
    address: 4400
    bitmask: 0x01

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Version Mismatch"
    register_type: holding
    address: 4400
    bitmask: 0x02

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Forced Charge"
    register_type: holding
    address: 4400
    bitmask: 0x04

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Charge Stopped"
    register_type: holding
    address: 4400
    bitmask: 0x08

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} BMS Discharge Stopped"
    register_type: holding
    address: 4400
    bitmask: 0x10

text_sensor:
  - platform: template
    name: "${friendly_name} Smart Port Status"
    lambda: |-
      if (isnan(id(ivem_smart_port_status_raw).state)) {
        return {"Unknown"};
      }
      switch (static_cast<int>(id(ivem_smart_port_status_raw).state)) {
        case 0:
          return {"Generator Input"};
        case 1:
          return {"Smart Load Output"};
        default:
          return {"Unknown"};
      }

