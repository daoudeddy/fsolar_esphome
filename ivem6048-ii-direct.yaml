# First-pass ESPHome config for a single IVEM6048-II.
#
# This replaces an ESPHome Modbus TCP bridge with a direct Modbus RTU node on
# the same ESP32. It reuses the IVEM register map already implemented in this
# repository.
#
# Notes:
# - Replace the Wi-Fi block with your own package include if you already use one.
# - Confirm the inverter slave address before flashing.
# - `max_cmd_retries` is set to 0 on purpose. Some IVEM writes can succeed even
#   when the inverter does not acknowledge cleanly, so avoiding automatic write
#   retries is safer.
# - Validate each writable setting individually on the inverter before relying
#   on it in automations.

substitutions:
  name: ivem6048ii
  friendly_name: "IVEM6048-II"
  modbus_address: "1"
  update_interval: 10s
  command_throttle: 100ms

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
api:
ota:
  platform: esphome

packages:
  wifi: !include common/wifi.yaml

uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  stop_bits: 1
  parity: NONE
  rx_buffer_size: 512

modbus:
  id: modbus_bus
  send_wait_time: 200ms
  # Uncomment if your RS485 transceiver needs explicit direction control.
  # flow_control_pin: GPIO4

modbus_controller:
  - id: ivem
    address: ${modbus_address}
    modbus_id: modbus_bus
    setup_priority: -10
    update_interval: ${update_interval}
    command_throttle: ${command_throttle}
    max_cmd_retries: 0
    offline_skip_updates: 0

sensor:
  # Core battery values.
  - platform: modbus_controller
    modbus_controller_id: ivem
    id: ivem_battery_current
    name: "${friendly_name} Battery Current"
    register_type: holding
    address: 4620
    register_count: 6
    value_type: S_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    id: ivem_battery_voltage
    name: "${friendly_name} Battery Voltage"
    register_type: holding
    address: 4621
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: ivem
    id: ivem_battery_soc
    name: "${friendly_name} Battery SoC"
    register_type: holding
    address: 4624
    value_type: U_WORD
    device_class: battery
    state_class: measurement
    unit_of_measurement: "%"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Battery SoH"
    register_type: holding
    address: 4625
    value_type: U_WORD
    device_class: battery
    state_class: measurement
    unit_of_measurement: "%"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Additional battery and BMS limits.
  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Battery Line Voltage"
    register_type: holding
    address: 4608
    register_count: 6
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Battery Charge Discharge Limit Voltage"
    register_type: holding
    address: 4609
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Battery Max Charge Current Limit"
    register_type: holding
    address: 4610
    value_type: U_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Battery Max Discharge Current Limit"
    register_type: holding
    address: 4611
    value_type: U_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Battery System Fault Code"
    register_type: holding
    address: 4612
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: ivem
    id: ivem_battery_system_status_state
    name: "${friendly_name} Battery System Status State"
    register_type: holding
    address: 4613
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  # PV.
  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} PV1 Voltage"
    register_type: holding
    address: 4390
    register_count: 5
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} PV1 Current"
    register_type: holding
    address: 4393
    value_type: S_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - lambda: |-
          return x < 0.0f ? 0.0f : x;

  - platform: modbus_controller
    modbus_controller_id: ivem
    id: ivem_pv1_power
    name: "${friendly_name} PV1 Power"
    register_type: holding
    address: 4394
    value_type: S_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0
    filters:
      - lambda: |-
          return x < 0.0f ? 0.0f : x;

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} PV2 Voltage"
    register_type: holding
    address: 4441
    register_count: 3
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} PV2 Current"
    register_type: holding
    address: 4442
    value_type: S_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: A
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - lambda: |-
          return x < 0.0f ? 0.0f : x;

  - platform: modbus_controller
    modbus_controller_id: ivem
    id: ivem_pv2_power
    name: "${friendly_name} PV2 Power"
    register_type: holding
    address: 4443
    value_type: S_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0
    filters:
      - lambda: |-
          return x < 0.0f ? 0.0f : x;

  - platform: template
    name: "${friendly_name} PV Power"
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0
    lambda: |-
      if (isnan(id(ivem_pv1_power).state) || isnan(id(ivem_pv2_power).state)) {
        return NAN;
      }
      return id(ivem_pv1_power).state + id(ivem_pv2_power).state;

  # Inverter and AC values.
  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Inverter Fault Code"
    register_type: holding
    address: 4355
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: ivem
    id: ivem_battery_power
    name: "${friendly_name} Battery Power"
    register_type: holding
    address: 4362
    register_count: 8
    value_type: S_WORD
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: ivem
    name: "${friendly_name} Inverter Voltage"
    register_type: holding
    address: 4364
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ivem
